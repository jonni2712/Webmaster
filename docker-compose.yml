# ================================
# Webmaster Monitor - Docker Compose
# Self-hosted deployment stack
# ================================
#
# Quick Start:
#   1. cp .env.example .env
#   2. Edit .env with your settings
#   3. docker-compose up -d
#
# Services:
#   - app: Next.js application (port 3000)
#   - db: PostgreSQL database (port 5432)
#   - supabase-studio: Database UI (port 3001) [optional]
#
# ================================

version: '3.8'

services:
  # ================================
  # PostgreSQL Database
  # ================================
  db:
    image: postgres:15-alpine
    container_name: webmaster-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-webmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password required}
      POSTGRES_DB: ${POSTGRES_DB:-webmaster}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webmaster} -d ${POSTGRES_DB:-webmaster}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webmaster-network

  # ================================
  # Webmaster Monitor App
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    image: webmaster-monitor:latest
    container_name: webmaster-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-webmaster}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-webmaster}

      # Supabase (self-hosted or cloud)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # NextAuth
      NEXTAUTH_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NextAuth secret required}

      # App
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - webmaster-network

  # ================================
  # Supabase Studio (Optional)
  # Database management UI
  # ================================
  supabase-studio:
    image: supabase/studio:latest
    container_name: webmaster-studio
    restart: unless-stopped
    profiles:
      - studio
    depends_on:
      db:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://db:5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "${STUDIO_PORT:-3001}:3000"
    networks:
      - webmaster-network

  # ================================
  # Traefik Reverse Proxy (Optional)
  # For production with SSL
  # ================================
  traefik:
    image: traefik:v2.10
    container_name: webmaster-traefik
    restart: unless-stopped
    profiles:
      - production
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - webmaster-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth"

networks:
  webmaster-network:
    driver: bridge

volumes:
  postgres_data:
  letsencrypt_data:
